<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCall Admin Panel</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Login View -->
    <div id="login-view" class="view active">
      <div class="login-container">
        <div class="login-card">
          <h1>WebCall</h1>
          <p class="subtitle">Agent Login</p>
          <form id="login-form">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required autocomplete="email" placeholder="agent@example.com">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" required autocomplete="current-password" placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
            <p class="error-msg" id="login-error"></p>
          </form>
        </div>
      </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view">
      <header class="topbar">
        <div class="topbar-left">
          <h2>WebCall</h2>
          <span class="connection-status" id="connection-status">Connecting...</span>
        </div>
        <button class="topbar-menu-btn" id="topbar-menu-btn" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-right" id="topbar-right">
          <div class="agent-info">
            <span id="agent-name"></span>
            <span class="badge" id="agent-role"></span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="availability-toggle">
            <span class="toggle-slider"></span>
            <span class="toggle-label" id="availability-label">Unavailable</span>
          </label>
          <button class="btn btn-outline" id="logout-btn">Logout</button>
        </div>
      </header>

      <main class="dashboard-content">
        <!-- Call Notification Banner -->
        <div class="call-notification" id="call-notification" style="display:none;">
          <div class="call-notification-content">
            <div class="call-notification-icon">
              <div class="phone-ring"></div>
            </div>
            <div class="call-notification-info">
              <h3>Incoming Call</h3>
              <p id="call-notification-detail">A user is calling...</p>
              <div class="call-notification-timer" id="call-timer">20s</div>
            </div>
            <div class="call-notification-actions">
              <button class="btn btn-accept" id="call-accept-btn">Accept</button>
              <button class="btn btn-reject" id="call-reject-btn">Reject</button>
            </div>
          </div>
        </div>

        <!-- Active Call Panel -->
        <div class="active-call-panel" id="active-call-panel" style="display:none;">
          <div class="active-call-content">
            <div class="call-status-icon active-pulse"></div>
            <div class="active-call-info">
              <h3>Call in Progress</h3>
              <p class="call-duration" id="call-duration">00:00</p>
            </div>
            <div class="call-actions">
              <button class="btn btn-mute" id="call-mute-btn" title="Mute microphone">
                <svg class="mute-icon unmuted" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                <svg class="mute-icon muted" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path fill="currentColor" d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/></svg>
                <span class="mute-label">Mute</span>
              </button>
              <button class="btn btn-reject" id="call-hangup-btn">Hang Up</button>
            </div>
          </div>
          <audio id="remote-audio" autoplay></audio>
        </div>

        <div class="panels">
          <!-- Agents Panel (Admin view) -->
          <section class="panel" id="agents-panel">
            <h3>Agents</h3>
            <div class="agent-list" id="agent-list">
              <p class="empty-state">Loading agents...</p>
            </div>
          </section>

          <!-- Call Logs Panel -->
          <section class="panel" id="calls-panel">
            <h3>Recent Calls</h3>
            <div class="call-log-list" id="call-log-list">
              <p class="empty-state">No recent calls</p>
            </div>
          </section>
        </div>

        <!-- Admin: Create Agent -->
        <section class="panel" id="create-agent-panel" style="display:none;">
          <h3>Create New Agent</h3>
          <form id="create-agent-form">
            <div class="form-row">
              <div class="form-group">
                <label for="new-agent-name">Display Name</label>
                <input type="text" id="new-agent-name" required>
              </div>
              <div class="form-group">
                <label for="new-agent-email">Email</label>
                <input type="email" id="new-agent-email" required>
              </div>
              <div class="form-group">
                <label for="new-agent-password">Password</label>
                <input type="password" id="new-agent-password" required minlength="6">
              </div>
              <div class="form-group">
                <label for="new-agent-role">Role</label>
                <select id="new-agent-role">
                  <option value="agent">Agent</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary">Create</button>
            </div>
            <p class="error-msg" id="create-agent-error"></p>
            <p class="success-msg" id="create-agent-success"></p>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/visibility.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/calls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
